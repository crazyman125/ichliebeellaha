
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Für Ellaha ❤️</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
background:linear-gradient(160deg,#ffd1dc,#ff9aa2);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
color:#4a1f26;
overflow-x:hidden;
}

.container{
width:92%;
max-width:420px;
background:white;
border-radius:20px;
padding:28px 20px 36px 20px;
box-shadow:0 12px 35px rgba(0,0,0,0.2);
}

h1{
margin-top:0;
font-size:28px;
}

.question{
display:none;
margin-top:20px;
animation:fade 0.6s ease;
}

input{
width:90%;
padding:12px;
font-size:16px;
border-radius:10px;
border:1px solid #ddd;
margin-top:12px;
}

button{
margin-top:12px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-weight:bold;
}

button:active{
transform:scale(0.97);
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

.heart{
position:fixed;
pointer-events:none;
animation:fall linear forwards;
}

@keyframes fall{
0%{transform:translateY(-10vh) rotate(0deg);opacity:1;}
100%{transform:translateY(110vh) rotate(360deg);opacity:0;}
}

#final{
display:none;
font-size:22px;
margin-top:15px;
animation:fade 1s ease;
}

</style>
</head>

<body>

<div class="container">

<h1>Für Ellaha ❤️</h1>
<p>Beantworte unsere kleinen Liebesrätsel.</p>

<div class="question" id="q1box">
<p>Wann bist du geboren?</p>
<input id="q1" placeholder="TT.MM.JJJJ">
<br>
<button onclick="check(1)">Antwort</button>
</div>

<div class="question" id="q2box">
<p>Wann war unser erstes Date?</p>
<input id="q2" placeholder="TT.MM.JJJJ">
<br>
<button onclick="check(2)">Antwort</button>
</div>

<div class="question" id="q3box">
<p>Wann haben wir uns verlobt?</p>
<input id="q3" placeholder="TT.MM.JJJJ">
<br>
<button onclick="check(3)">Antwort</button>
</div>

<div class="question" id="q4box">
<p>Wann haben wir geheiratet?</p>
<input id="q4" placeholder="TT.MM.JJJJ">
<br>
<button onclick="check(4)">Antwort</button>
</div>

<div id="final">
❤️ Ellaha ❤️
<br><br>
Jeder dieser Tage hat mein Leben verändert.
<br><br>
Und das Schönste ist:
<br><br>
Unsere Geschichte hat gerade erst begonnen.
</div>

</div>

<script>

const answers={
1:"10.03.1993",
2:"14.06.2025",
3:"23.08.2025",
4:"24.08.2025"
}

let level=0

function check(n){

let val=document.getElementById("q"+n).value.trim()

if(val===answers[n]){

level++
heartEffect(level)

document.getElementById("q"+n+"box").style.display="none"

if(n<4){
document.getElementById("q"+(n+1)+"box").style.display="block"
}else{
document.getElementById("final").style.display="block"
megaHearts()
}

}else{

navigator.vibrate?.(200)
alert("Fast ❤️ Versuch es nochmal")

}

}

function heartEffect(stage){

let count=15*stage

for(let i=0;i<count;i++){

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(16+Math.random()*30*stage)+"px"
h.style.animationDuration=(3+Math.random()*2)+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),5000)

}

}

function megaHearts(){

setInterval(()=>{

let h=document.createElement("div")
h.className="heart"
h.innerHTML="❤️"

h.style.left=Math.random()*100+"vw"
h.style.fontSize=(30+Math.random()*40)+"px"
h.style.animationDuration=(4+Math.random()*3)+"s"

document.body.appendChild(h)

setTimeout(()=>h.remove(),7000)

},250)

}

document.getElementById("q1box").style.display="block"

</script>

</body>
</html>
