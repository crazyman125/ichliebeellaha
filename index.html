<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ellahas Zelda Love RPG ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
background:#1e3d2f;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
overflow:hidden;
color:white;
}

canvas{
display:block;
margin:0 auto;
background:#3fa34d;
image-rendering:pixelated;
}

#controls{
position:fixed;
bottom:20px;
width:100%;
display:flex;
justify-content:space-around;
}

.ctrl{
width:60px;
height:60px;
border-radius:50%;
border:none;
font-size:24px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(5px);
}

#dialog{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.9);
padding:15px;
display:none;
}

input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:none;
}

button.answer{
margin-top:8px;
width:100%;
padding:10px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
}
</style>
</head>

<body>

<canvas id="game" width="320" height="480"></canvas>

<div id="controls">
<button class="ctrl" onclick="move(0,-1)">⬆️</button>
<button class="ctrl" onclick="move(-1,0)">⬅️</button>
<button class="ctrl" onclick="move(1,0)">➡️</button>
<button class="ctrl" onclick="move(0,1)">⬇️</button>
</div>

<div id="dialog">
<p id="question"></p>
<input id="answer" placeholder="TT.MM.JJJJ">
<button class="answer" onclick="checkAnswer()">Antwort</button>
</div>

<div id="final">
<h1>❤️ Ellaha ❤️</h1>
<p>Unsere Reise endet nie.</p>
<p>Du bist mein Abenteuer.</p>
</div>

<script>
const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const tile=32;
let stage=1;

let player={x:4,y:12};
let npcs=[
{x:4,y:6},
{x:7,y:3},
{x:4,y:1}
];

const map=[
"GGGGGGGGGG",
"GGTGGGGGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGTGGGTGGG",
"GGGGGGGGGG"
];

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let y=0;y<map.length;y++){
for(let x=0;x<map[y].length;x++){
if(map[y][x]==="G"){
ctx.fillStyle="#3fa34d";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
if(map[y][x]==="T"){
ctx.fillStyle="#8b5a2b";
ctx.fillRect(x*tile,y*tile,tile,tile);
}
}
}

ctx.fillStyle="yellow";
ctx.fillRect(player.x*tile,player.y*tile,tile,tile);

ctx.fillStyle="white";
npcs.forEach(n=>{
ctx.fillRect(n.x*tile,n.y*tile,tile,tile);
});
}

function move(dx,dy){
let nx=player.x+dx;
let ny=player.y+dy;

if(nx>=0 && nx<10 && ny>=0 && ny<13){
player.x=nx;
player.y=ny;
checkNPC();
draw();
}
}

function checkNPC(){
if(stage<=3){
let npc=npcs[stage-1];
if(player.x===npc.x && player.y===npc.y){
openDialog();
}
}
}

function openDialog(){
let text="";
if(stage===1) text="Wann bist du geboren?";
if(stage===2) text="Wann war unser erstes Date?";
if(stage===3) text="Wann haben wir geheiratet?";
document.getElementById("question").innerText=text;
document.getElementById("dialog").style.display="block";
}

function closeDialog(){
document.getElementById("dialog").style.display="none";
document.getElementById("answer").value="";
}

function hearts(amount){
for(let i=0;i<amount;i++){
let h=document.createElement("div");
h.innerHTML="❤️";
h.style.position="fixed";
h.style.left=Math.random()*100+"vw";
h.style.top="-20px";
h.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(h);
h.animate([{transform:"translateY(0px)"},{transform:"translateY(600px)"}],{duration:3000});
setTimeout(()=>h.remove(),3000);
}
}

function checkAnswer(){
let val=document.getElementById("answer").value;

if(stage===1 && val==="10.03.1993"){
hearts(15);
stage++;
closeDialog();
}
else if(stage===2 && val==="14.06.2025"){
hearts(30);
stage++;
closeDialog();
}
else if(stage===3 && val==="24.08.2025"){
hearts(60);
closeDialog();
document.getElementById("final").style.display="flex";
}
else{
alert("Fast ❤️");
}
}

draw();
</script>

</body>
</html>
