<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ellahas Love RPG ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(270deg,#ff758c,#ff7eb3,#ff758c);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
overflow:hidden;
color:white;
}

@keyframes bgMove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

#game{
position:relative;
height:75vh;
width:100vw;
overflow:hidden;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:100px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(5px);
}

#player{
position:absolute;
bottom:110px;
left:5%;
font-size:42px;
transition:0.15s linear;
}

.npc{
position:absolute;
bottom:110px;
font-size:42px;
}

#npc1{left:35%;}
#npc2{left:60%;}
#npc3{left:85%;}

#dialog{
position:fixed;
bottom:0;
width:100%;
background:rgba(0,0,0,0.85);
padding:20px;
display:none;
animation:slideUp 0.3s ease;
}

@keyframes slideUp{
from{transform:translateY(100%);}
to{transform:translateY(0);}
}

#dialog p{
margin-bottom:10px;
font-size:18px;
}

input{
width:100%;
padding:14px;
border-radius:10px;
border:none;
font-size:18px;
margin-bottom:10px;
}

button{
width:48%;
padding:14px;
border:none;
border-radius:10px;
font-size:18px;
background:#ff4d6d;
color:white;
}

#controls{
position:fixed;
bottom:110px;
width:100%;
display:flex;
justify-content:space-between;
padding:0 20px;
}

.ctrlBtn{
width:45%;
padding:18px;
font-size:22px;
border:none;
border-radius:15px;
background:rgba(255,255,255,0.2);
color:white;
backdrop-filter:blur(5px);
}

.heart{
position:fixed;
font-size:24px;
animation:fall 3s linear forwards;
}

@keyframes fall{
0%{transform:translateY(-50px);opacity:1;}
100%{transform:translateY(110vh);opacity:0;}
}

#final{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
text-align:center;
flex-direction:column;
animation:fadeIn 1s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

#final h1{
font-size:32px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div id="game">
<div id="player">👩</div>
<div class="npc" id="npc1">👨</div>
<div class="npc" id="npc2">🤵</div>
<div class="npc" id="npc3">💍</div>
<div id="ground"></div>
</div>

<div id="controls">
<button class="ctrlBtn" onclick="move(-4)">⬅️</button>
<button class="ctrlBtn" onclick="move(4)">➡️</button>
</div>

<div id="dialog">
<p id="question"></p>
<input id="answer" placeholder="TT.MM.JJJJ">
<button onclick="submitAnswer()">Antwort</button>
</div>

<div id="final">
<h1>❤️ Ellaha ❤️</h1>
<p>Du hast jeden Weg gemeistert.</p>
<p>Und ich wähle dich.</p>
<p>Heute. Morgen. Für immer.</p>
</div>

<script>

let pos=5;
let stage=1;

function move(step){
pos+=step;
if(pos<0)pos=0;
if(pos>90)pos=90;
document.getElementById("player").style.left=pos+"%";
checkNPC();
}

function checkNPC(){
if(stage===1 && pos>33 && pos<40){
openDialog("Weißt du noch… wann wurdest du geboren?");
}
if(stage===2 && pos>58 && pos<65){
openDialog("Wann war unser erstes Date?");
}
if(stage===3 && pos>83){
openDialog("Wann haben wir geheiratet?");
}
}

function openDialog(text){
document.getElementById("question").innerText=text;
document.getElementById("dialog").style.display="block";
}

function closeDialog(){
document.getElementById("dialog").style.display="none";
document.getElementById("answer").value="";
}

function hearts(amount){
for(let i=0;i<amount;i++){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize=(20+Math.random()*25)+"px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
}
}

function explosion(){
setInterval(()=>{
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.fontSize="40px";
document.body.appendChild(h);
setTimeout(()=>h.remove(),3000);
},200);
}

function submitAnswer(){
let val=document.getElementById("answer").value;

if(stage===1 && val==="10.03.1993"){
hearts(15);
stage=2;
closeDialog();
}
else if(stage===2 && val==="14.06.2025"){
hearts(30);
stage=3;
closeDialog();
}
else if(stage===3 && val==="24.08.2025"){
hearts(60);
closeDialog();
document.getElementById("final").style.display="flex";
explosion();
}
else{
navigator.vibrate && navigator.vibrate(200);
alert("Fast ❤️ Versuch es nochmal");
}
}

</script>

</body>
</html>
